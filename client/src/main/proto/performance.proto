syntax = "proto3";

package performance;

option java_multiple_files = true;
option java_package = "org.noveljava.grpcperformancetestclient.grpc";
option java_outer_classname = "PerformanceProto";

service PerformanceTest {
  rpc Process(stream TestRequest) returns (stream TestResponse);
}

message TestRequest {
  int64 id = 1;
  string text = 2;
  int64 correlation_id = 3;
}

message TestResponse {
  int64 id = 1;
  string text = 2;
  int64 correlation_id = 3;
}
